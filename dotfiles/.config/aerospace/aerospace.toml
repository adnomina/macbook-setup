config-version = 2

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = "tiles"

default-root-container-orientation = "auto"

on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
on-focus-changed = "move-mouse window-lazy-center"

automatically-unhide-macos-hidden-apps = true

persistent-workspaces = ["1", "2", "3", "4"]

[key-mapping]
    preset = "qwerty"

[gaps]
    inner.horizontal = 10
    inner.vertical = 10
    outer.top = 5
    outer.right = 5
    outer.bottom = 5
    outer.left = 5

[mode.main.binding]
    alt-h = "focus left --boundaries-action stop"
    alt-j = "focus down --boundaries-action stop"
    alt-k = "focus up --boundaries-action stop"
    alt-l = "focus right --boundaries-action stop"

    alt-shift-h = "workspace prev"
    alt-shift-l = "workspace next"

    cmd-h = [] # Disable "hide application"
    cmd-alt-h = [] # Disable "hide others"

[mode.resize.binding]
    h = "resize width +50"
    j = "resize height -50"
    k = "resize height +50"
    l = "resize width -50"
    enter = "mode main"
    esc = "mode main"
    ctrl-c = "mode main"

[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.brnbw.Tuna'
run = ['layout floating']
