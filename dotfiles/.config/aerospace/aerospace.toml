config-version = 2

start-at-login = true

persistent-workspaces = []

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = "tiles"

default-root-container-orientation = "auto"

on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
on-focus-changed = "move-mouse window-lazy-center"

automatically-unhide-macos-hidden-apps = true

after-startup-command = [
    'workspace 💬', 'layout h_accordion',
    'workspace 🌐', 'layout tiles',
    'workspace 💻', 'layout h_accordion',
    'workspace 💬',
]

[key-mapping]
    preset = "qwerty"

[gaps]
    inner.horizontal = 10
    inner.vertical = 10

[mode.main.binding]
    alt-h = "focus left --boundaries-action stop"
    alt-j = "focus down --boundaries-action stop"
    alt-k = "focus up --boundaries-action stop"
    alt-l = "focus right --boundaries-action stop"

    alt-shift-h = "move left"
    alt-shift-j = "move down"
    alt-shift-k = "move up"
    alt-shift-l = "move right"

    alt-f = "fullscreen"

    alt-s = "layout v_accordion"
    alt-w = "layout h_accordion"
    alt-e = "layout tiles horizontal vertical"

    alt-shift-space = "layout floating tiling"

    alt-1 = "workspace 💬"
    alt-2 = "workspace 🌐"
    alt-3 = "workspace 💻"

    alt-shift-1 = "move-node-to-workspace --focus-follows-window 💬"
    alt-shift-2 = "move-node-to-workspace --focus-follows-window 🌐"
    alt-shift-3 = "move-node-to-workspace --focus-follows-window 💻"

    cmd-h = [] # Disable "hide application"
    cmd-alt-h = [] # Disable "hide others"

    alt-shift-c = "reload-config"

    alt-r = "mode resize"

[mode.resize.binding]
    h = "resize width +50"
    j = "resize height -50"
    k = "resize height +50"
    l = "resize width -50"
    enter = "mode main"

# 💬 — Communication
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['move-node-to-workspace 💬']

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace 💬']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace 💬']

# 🌐 — Browser
[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = ['move-node-to-workspace 🌐']

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = ['move-node-to-workspace 🌐']

# 💻 — Dev
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 💻']

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = ['move-node-to-workspace 💻']

# Floating
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.brnbw.Tuna'
run = ['layout floating']
