"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
follow_symlinks = false

format = """
[>_](pink)\
$username\
$directory\
$git_branch\
$git_status\
$character\
"""

palette = "catppuccin_macchiato"

[username]
show_always = true
format = "[ $user](green)"

[directory]
style = "sapphire"
format = "[ $path]($style)"
truncation_length = 4

[git_branch]
symbol = "[](lavender)"
format = "[ $symbol $branch](lavender)"

[git_status]
format = "[$untracked$staged$modified$renamed$conflicted$ahead_behind]($style)"
staged = "[ +${count}](green)"
modified = "[ !${count}](yellow)"
renamed = "[ »${count}](blue)"
deleted = "[ -${count}](red)"
untracked = "[ ?${count}](sapphire)"
stashed = "[ ≡${count}](lavender)"
conflicted = "[ ✖${count}](red bold)"
ahead = "[ ⇡${count}](teal)"
behind = "[ ⇣${count}](peach)"
diverged = "[ ⇕⇡${ahead_count}⇣${behind_count}](mauve)"

[character]
disabled = false
success_symbol = "[ ❯](bold fg:green)"
error_symbol = "[ ❯](bold fg:red)"

[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
